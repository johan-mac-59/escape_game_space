<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATION KEPLER-7 — Escape Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --bg: #05090a;
  --panel: #071312;
  --panel-edge: #0e2624;
  --text: #b9ffd8;
  --text-dim: #5f9a86;
  --mauve: #ff5fe0;
  --rouge: #ff5252;
  --vert: #39ff8c;
  --cyan: #3ee6ff;
  --jaune: #ffd23f;
  --glow: 0 0 6px currentColor;
}

*{ box-sizing: border-box; }

html,body{
  height:100%;
  margin:0;
  background: radial-gradient(ellipse at 50% 0%, #0a1614 0%, var(--bg) 70%);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  overflow:hidden;
}

/* ---- CRT overlay ---- */
#crt-overlay{
  pointer-events:none;
  position:fixed; inset:0; z-index:50;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.0) 0px,
      rgba(0,0,0,0.0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.0) 4px
    );
  mix-blend-mode: multiply;
  animation: flicker 6.5s infinite;
}
@keyframes flicker{
  0%,100%{ opacity: 0.9; }
  92%{ opacity: 0.9; }
  93%{ opacity: 0.65; }
  94%{ opacity: 0.9; }
  96%{ opacity: 0.75; }
  97%{ opacity: 0.9; }
}
#crt-overlay::after{
  content:"";
  position:absolute; inset:0;
  box-shadow: inset 0 0 140px 40px rgba(0,0,0,0.65);
}

@media (prefers-reduced-motion: reduce){
  #crt-overlay{ animation: none; }
  *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

/* ---- layout ---- */
.app{
  position:relative;
  height:100vh;
  display:grid;
  grid-template-columns: 1fr 220px;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "header header"
    "screen sidebar"
    "input  sidebar";
  gap: 0;
  padding: 14px;
}

@media (max-width: 760px){
  .app{
    grid-template-columns: 1fr;
    grid-template-areas:
      "header"
      "screen"
      "sidebar"
      "input";
  }
  #sidebar{ flex-direction: row !important; overflow-x:auto; }
  .gauge{ width: 90px !important; }
}

header{
  grid-area: header;
  display:flex;
  align-items:center;
  justify-content: space-between;
  border: 1px solid var(--panel-edge);
  background: linear-gradient(180deg, #0b1a18, #071211);
  padding: 10px 16px;
  margin-bottom: 10px;
  border-radius: 4px;
  box-shadow: 0 0 22px -6px rgba(57,255,140,0.15);
}
header h1{
  font-family: 'VT323', monospace;
  font-size: 28px;
  letter-spacing: 3px;
  margin:0;
  color: var(--cyan);
  text-shadow: var(--glow);
}
header .sub{
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
}

#screen{
  grid-area: screen;
  overflow-y: auto;
  border: 1px solid var(--panel-edge);
  background: var(--panel);
  padding: 16px 18px;
  border-radius: 4px;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
}
#screen pre{
  margin: 0 0 10px 0;
  white-space: pre-wrap;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.35;
}
.line{
  margin: 2px 0 10px 0;
  line-height: 1.45;
}
.echo{
  color: var(--text-dim);
}
.echo::before{ content: "> "; }

.mauve{ color: var(--mauve); text-shadow: 0 0 6px rgba(255,95,224,0.5); }
.rouge{ color: var(--rouge); text-shadow: 0 0 6px rgba(255,82,82,0.5); }
.vert{ color: var(--vert); text-shadow: 0 0 6px rgba(57,255,140,0.5); }
.cyan{ color: var(--cyan); text-shadow: 0 0 6px rgba(62,230,255,0.5); }
.jaune{ color: var(--jaune); text-shadow: 0 0 6px rgba(255,210,63,0.5); }

#input-row{
  grid-area: input;
  display:flex;
  align-items:center;
  gap: 8px;
  border: 1px solid var(--panel-edge);
  background: #050d0c;
  padding: 10px 14px;
  margin-top: 10px;
  border-radius: 4px;
}
#input-row .prompt{
  color: var(--vert);
  font-weight: 700;
}
#cmd-input{
  flex:1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  caret-color: var(--vert);
}
#cmd-input:focus-visible{
  outline: 1px solid var(--cyan);
  outline-offset: 2px;
}
#cmd-input::placeholder{ color: var(--text-dim); }

#sidebar{
  grid-area: sidebar;
  margin-left: 10px;
  display:flex;
  flex-direction: column;
  gap: 14px;
}
.panel{
  border: 1px solid var(--panel-edge);
  background: var(--panel);
  border-radius: 4px;
  padding: 12px;
}
.panel h2{
  font-family: 'VT323', monospace;
  font-size: 16px;
  letter-spacing: 2px;
  margin: 0 0 8px 0;
  color: var(--text-dim);
}

/* Oxygen gauge — signature element */
.gauge{
  height: 220px;
  width: 46px;
  margin: 4px auto 8px auto;
  border: 1px solid var(--panel-edge);
  border-radius: 4px;
  position: relative;
  background: repeating-linear-gradient(to bottom, #081412 0 2px, #0a1917 2px 22px);
  overflow:hidden;
}
.gauge-fill{
  position:absolute;
  bottom:0; left:0; right:0;
  background: linear-gradient(to top, var(--vert), #8dffb8);
  transition: height 0.5s ease, background 0.5s ease;
  box-shadow: 0 0 14px 2px rgba(57,255,140,0.55);
}
.gauge-label{
  text-align:center;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.gauge-pct{
  text-align:center;
  font-family: 'VT323', monospace;
  font-size: 22px;
  color: var(--vert);
  text-shadow: var(--glow);
}

.hearts{
  text-align:center;
  font-size: 16px;
  letter-spacing: 2px;
  margin-top: 4px;
}

#inv-list{
  list-style:none;
  margin:0; padding:0;
  font-size: 12.5px;
  color: var(--text);
  min-height: 20px;
}
#inv-list li{
  padding: 4px 0;
  border-bottom: 1px dashed var(--panel-edge);
}
#inv-list li:last-child{ border-bottom:none; }
#inv-empty{ color: var(--text-dim); font-size: 12px; }

.badge{
  display:inline-block;
  font-family:'VT323', monospace;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 2px 8px;
  border: 1px solid var(--panel-edge);
  border-radius: 3px;
  color: var(--text-dim);
}

#restart-btn{
  display:none;
  margin: 10px auto 0 auto;
  background: transparent;
  border: 1px solid var(--vert);
  color: var(--vert);
  font-family: 'JetBrains Mono', monospace;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 1px;
}
#restart-btn:hover{ background: rgba(57,255,140,0.1); }

#screen::-webkit-scrollbar{ width: 8px; }
#screen::-webkit-scrollbar-thumb{ background: var(--panel-edge); border-radius: 4px; }
</style>
</head>
<body>

<div id="crt-overlay"></div>

<div class="app">
  <header>
    <div>
      <h1>🛰 STATION KEPLER-7</h1>
      <div class="sub">MODULE DE SURVIE — RECYCLAGE D'AIR EN DÉFAILLANCE</div>
    </div>
    <span class="badge" id="room-badge">SALLE 01</span>
  </header>

  <div id="screen" aria-live="polite"></div>

  <div id="input-row">
    <span class="prompt">›</span>
    <input id="cmd-input" type="text" autocomplete="off" placeholder="Tapez une réponse, 'inventaire' ou 'indice'…" autofocus />
  </div>

  <div id="sidebar">
    <div class="panel">
      <h2>OXYGÈNE</h2>
      <div class="gauge"><div class="gauge-fill" id="gauge-fill" style="height:100%"></div></div>
      <div class="gauge-pct" id="gauge-pct">100%</div>
      <div class="hearts" id="hearts">❤️❤️❤️❤️❤️❤️❤️</div>
      <button id="restart-btn">↻ RECOMMENCER</button>
    </div>
    <div class="panel">
      <h2>INVENTAIRE 👜</h2>
      <ul id="inv-list"></ul>
      <div id="inv-empty">Vide</div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const CODE_FINAL = "013";
  const VIES_MAX = 7;

  const screenEl = document.getElementById('screen');
  const inputEl = document.getElementById('cmd-input');
  const gaugeFill = document.getElementById('gauge-fill');
  const gaugePct = document.getElementById('gauge-pct');
  const heartsEl = document.getElementById('hearts');
  const invListEl = document.getElementById('inv-list');
  const invEmptyEl = document.getElementById('inv-empty');
  const roomBadge = document.getElementById('room-badge');
  const restartBtn = document.getElementById('restart-btn');

  let vies, inventaire, handler, nbSecretRoom1;
  const NOMBRE_SECRET_ROOM2 = 42;

  // ---- helpers ----
  const mauve = s => `<span class="mauve">${s}</span>`;
  const rouge = s => `<span class="rouge">${s}</span>`;
  const vert  = s => `<span class="vert">${s}</span>`;
  const cyan  = s => `<span class="cyan">${s}</span>`;
  const jaune = s => `<span class="jaune">${s}</span>`;

  function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function normaliser(t){ return t.toLowerCase().trim(); }

  function printLine(html){
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = html;
    screenEl.appendChild(div);
    scrollDown();
  }
  function printBlock(html){
    const pre = document.createElement('pre');
    pre.innerHTML = html;
    screenEl.appendChild(pre);
    scrollDown();
  }
  function printEcho(text){
    const div = document.createElement('div');
    div.className = 'line echo';
    div.textContent = text;
    screenEl.appendChild(div);
    scrollDown();
  }
  function scrollDown(){ screenEl.scrollTop = screenEl.scrollHeight; }

  function updateStatus(room){
    const pct = Math.max(0, Math.round((vies / VIES_MAX) * 100));
    gaugeFill.style.height = pct + '%';
    gaugePct.textContent = pct + '%';
    gaugeFill.style.background = pct > 45
      ? 'linear-gradient(to top, #39ff8c, #8dffb8)'
      : pct > 20
        ? 'linear-gradient(to top, #ffd23f, #ffe58a)'
        : 'linear-gradient(to top, #ff5252, #ff9a9a)';
    heartsEl.textContent = '❤️'.repeat(Math.max(0, vies)) + '🖤'.repeat(Math.max(0, VIES_MAX - vies));

    if(inventaire.length === 0){
      invListEl.innerHTML = '';
      invEmptyEl.style.display = 'block';
    } else {
      invEmptyEl.style.display = 'none';
      invListEl.innerHTML = inventaire.map(o => `<li>${o}</li>`).join('');
    }
    if(room) roomBadge.textContent = room;
  }

  function afficherInventaire(){
    if(inventaire.length === 0){
      printLine('Votre inventaire est vide.');
      return;
    }
    let t = "Voici la liste des objets de votre inventaire :<br>";
    t += inventaire.map(o => "• " + o).join('<br>');
    printLine(t);
  }

  // returns false if the game just ended
  function perdreVie(){
    vies--;
    updateStatus();
    if(vies > 0){
      printLine(rouge(`Vous avez perdu une vie 💔, il vous en reste ${vies}`));
      return true;
    }
    gameOver();
    return false;
  }

  function gameOver(){
    printBlock(
`${rouge('Vous n\'avez plus de vie.')}
${rouge('L\'oxygène vient à manquer....')}
---------------------------
       ${rouge('GAME OVER')}
---------------------------`);
    endGame();
  }

  function victory(){
    printBlock(
`${vert('╔══════════════════════════════════════════════════════════════╗')}
${vert('║        🎉 MISSION ACCOMPLIE — VOUS AVEZ SURVÉCU ! 🎉         ║')}
${vert('╚══════════════════════════════════════════════════════════════╝')}

                     ${vert('▄▄████████▄▄')}
                   ${vert('▄██████████████▄')}
                  ${vert('██████████████████')}
                 ${vert('▀██████████████████▀')}
                   ${vert('▀██████████████▀')}
                     ${vert('▀▀████████▀▀')}      ${vert('🌍 LA TERRE')}

${vert('La porte de la navette s\'ouvre enfin.')}
${vert('Décompression dans 5... 4...')}

Vous vous jetez à l'intérieur, verrouillez le sas et basculez les
commandes sur le poste de pilotage. Les propulseurs s'allument
alors que le hangar de la station commence à se déchirer.

Vous quittez la zone à toute vitesse. Au loin, à travers le hublot,
vous apercevez la Terre. L'air pur de sa surface n'est plus qu'à
quelques heures de vol.

${vert('UN GRAND BRAVO, VOUS AVEZ REJOINT LA TERRE SAIN ET SAUVE ! 🌍🙌')}`);
    endGame();
  }

  function endGame(){
    handler = null;
    inputEl.disabled = true;
    inputEl.placeholder = "Session terminée.";
    restartBtn.style.display = 'block';
  }

  // ---- SALLE 1 ----
  function room1Init(){
    nbSecretRoom1 = randInt(1, 50);
    updateStatus('SALLE 01');
    printBlock(
`${cyan('╔══════════════════════════════════════════════════════════════╗')}
${cyan('║                 🛰️  MODULE DE SURVIE — SALLE [01]             ║')}
${cyan('╚══════════════════════════════════════════════════════════════╝')}

     ______________________________________________________
    |                                                      |
    |     [ UNITÉ DE RECYCLAGE ] ⚠️ (Défaillance)          |
    |               │                                      |
    |               ▼                                      |
    |       ${mauve('[ POSTE DE CONTRÔLE ]')}                          |
    |               │                                      |
    |               ▼                                      |
    |         ${vert('╔═════════════════╗')}                          |
    |         ${vert('║   SAS VERS 02   ║')} 🔒 [ CODE REQUIS ]        |
    |         ${vert('╚═════════════════╝')}                          |
    |______________________________________________________|

${jaune('Commandes utiles :')} 'inventaire' 👜, 'indice' 💡
----------------------------------------------------------------
⚙️  Pour quitter cette zone, trouvez le code d'ouverture du sas.
⚙️  Le code est un nombre entier compris ${jaune('entre 1 et 50')}.
⚙️  Vous démarrez l'aventure avec ${rouge('7 vies')} ❤️.`);
    printLine("⏳ Quel est le code du sas / commande ?");
    handler = room1Handle;
  }

  function room1Handle(raw){
    const rep = normaliser(raw);
    if(rep === 'inventaire'){ afficherInventaire(); return; }
    if(rep === 'indice'){
      const lo = nbSecretRoom1 - randInt(0,7);
      const hi = nbSecretRoom1 + randInt(0,7);
      printLine(`💡 Indice : le nombre est entre ${lo} et ${hi}.`);
      printLine("Ceci vous coûte une vie.");
      perdreVie();
      return;
    }
    const nb = parseInt(rep, 10);
    if(isNaN(nb)){
      printLine("⏳ Entrez un nombre.");
      return;
    }
    if(nb === nbSecretRoom1){
      printLine(vert("Bravo, vous avez gagné un marteau [0] 👏"));
      inventaire.push("Marteau [0]");
      updateStatus();
      room2Init();
      return;
    } else if(nb > nbSecretRoom1){
      printLine("C'est plus petit.");
      perdreVie();
    } else {
      printLine("C'est plus grand.");
      perdreVie();
    }
  }

  // ---- SALLE 2 ----
  function room2Init(){
    updateStatus('SALLE 02');
    printBlock(
`${cyan('╔══════════════════════════════════════════════════════════════╗')}
${cyan('║                   ⚡ LA SALLE DU RÉACTEUR [02] ⚡              ║')}
${cyan('╚══════════════════════════════════════════════════════════════╝')}

     ______________________________________________________
    |                                                      |
    |     [ SAS 1 ] ───► ${mauve('⚡ RÉACTEUR PRINCIPAL ⚡')}               |
    |                           │                          |
    |                           ▼                          |
    |                       [ ÉCRAN ] 📝 (Post-it collé)   |
    |                           │                          |
    |                           ▼                          |
    |                     ${vert('╔═════════════════╗')}        |
    |                     ${vert('║   SAS VERS 03   ║')} 🔒 [ VERROUILLÉ ]  |
    |                     ${vert('╚═════════════════╝')}        |
    |______________________________________________________|

Vous arrivez dans la ${mauve('salle du réacteur')} ☢️
Vous devez impérativement remettre l'électricité pour ouvrir la porte.

⚙️  Trouvez la fréquence secrète entre ${jaune('1 et 100')}.
⚙️  Un post-it collé sur le coin de l'écran indique :
    ${jaune("\"Nombre de 2 chiffres dont l'un est le double de l'autre.\"")}
⚙️  Vous pouvez consulter l'indice à tout moment via la commande 'indice'.
Il vous reste ${vies} vies ❤️`);
    printLine("Votre code :");
    handler = room2Handle;
  }

  function room2Handle(raw){
    const lower = raw.toLowerCase().trim();
    if(lower === 'inventaire'){ afficherInventaire(); return; }
    if(lower === 'indice'){
      if(!perdreVie()) return;
      printLine("💡 Multiple de 2 mais pas de 4.");
      return;
    }
    const nb = parseInt(raw.trim(), 10);
    if(isNaN(nb)){
      printLine("⏳ Entrez un nombre.");
      return;
    }
    if(nb === NOMBRE_SECRET_ROOM2){
      printLine(vert("✅ Réacteur redémarré !"));
      printLine(vert("Vous ramassez la cellule d'énergie [1] 👏"));
      inventaire.push("Cellule d'énergie [1]");
      updateStatus();
      room3Init();
      return;
    } else if(nb < NOMBRE_SECRET_ROOM2){
      printLine("⬆️ Plus haut");
      perdreVie();
    } else {
      printLine("⬇️ Plus bas.");
      perdreVie();
    }
  }

  // ---- SALLE 3 ----
  function room3Init(){
    updateStatus('SALLE 03');
    printBlock(
`${cyan('╔══════════════════════════════════════════════════════════════╗')}
${cyan('║                   🚀 LE HANGAR PRINCIPAL [03]                ║')}
${cyan('╚══════════════════════════════════════════════════════════════╝')}

     ______________________________________________________
    |  [SAS 2] ──┐                                         |
    |            │     ___________                         |
    |            ▼    |           |    ${vert('╔═════════════════╗')} |
    |        [CONSOLE]│  NAVETTE  | ── ${vert('║  PORTE DU SAS   ║')} |
    |            │    | _  _  _   |    ${vert('║  (VERROUILLÉE)  ║')} |
    |            ▼    |___________|    ${vert('╚═════════════════╝')} |
    |   [COMBINAISONS]                                     |
    |______________________________________________________|

${rouge("🚨 ALERTE : L'oxygène a atteint un niveau critique.")}
Vous enfilez rapidement une combinaison 🧑‍🚀, ce qui vous redonne
une petite réserve d'air.

Pour pouvoir sortir de la station, vous allez devoir déverrouiller
la porte du hangar. Sur la console de la porte, vous voyez que
l'ouverture vous réclame un mot de passe.

Vous testez le code '123456' mais rien ne se passe...
La console bascule et affiche une ${jaune('question mystère')}.

Il vous reste ${vies} vies. ❤️`);
    printLine("⏳ Qui a fait le premier pas sur la lune ?<br>Écrivez 'indice' si vous souhaitez un indice.");
    handler = room3Handle;
  }

  function room3Handle(raw){
    const rep = normaliser(raw);
    if(rep === 'inventaire'){ afficherInventaire(); return; }
    if(rep === 'indice'){
      printLine("💡 Indice : Un petit pas pour l'homme, un grand pas pour l'humanité.");
      printLine("Ceci vous coûte une vie.");
      perdreVie();
      return;
    }
    if(rep === 'neil armstrong' || rep === 'armstrong'){
      printLine(vert("!!! Déverrouillage du sas !!!"));
      printLine("Décompression dans 10... 9....");
      printLine("Vous courez vers la navette !");
      printLine(vert("Vous récupérez une clé à pipe de taille [3] 👏"));
      inventaire.push("Clé à pipe de taille [3]");
      updateStatus();
      porteFinaleInit();
      return;
    }
    printLine("Ceci n'est pas la bonne réponse.");
    printLine("La console vous envoie une décharge électrique !");
    perdreVie();
  }

  // ---- PORTE FINALE ----
  function porteFinaleInit(){
    updateStatus('SAS FINAL');
    printBlock(
`${cyan('╔══════════════════════════════════════════════════════════════╗')}
${cyan("║                🚀 NAVETTE DE SECOURS - SAS FINAL             ║")}
${cyan('╚══════════════════════════════════════════════════════════════╝')}

     _________________________________________________________
    |                                                         |
    |     [ HANGAR ] ───► [ PANNEAU DE CONTRÔLE ]             |
    |                            │                            |
    |                            ▼                            |
    |                    ${rouge('╔═══════════════════╗')}                |
    |                    ${rouge('║ PORTE DE LA NEF   ║')} 🔒 [ BLOCAGE ] |
    |                    ${rouge('║   (VERROUILLÉE)   ║')}                |
    |                    ${rouge('╚═══════════════════╝')}                |
    |                            │                            |
    |                            ▼                            |
    |                     ${vert('▓▒░ ESCAPE POD ░▒▓')}                  |
    |_________________________________________________________|

Vous arrivez enfin devant la ${cyan('navette de secours')}.
L'alarme résonne dans toute la station...

${rouge('🚨 LA PORTE EST VERROUILLÉE !')}

À l'aide des indices et objets trouvés précédemment dans votre
${mauve('inventaire')}, calculez ou déduisez le code de déverrouillage final.

💡 ${jaune('Rappel :')} À tout moment, vous pouvez taper '${jaune('inventaire')}' 👜.
Il vous reste ${vies} vies. ❤️`);
    printLine("Code de la navette :");
    handler = porteFinaleHandle;
  }

  function porteFinaleHandle(raw){
    const rep = normaliser(raw);
    if(rep === 'inventaire'){ afficherInventaire(); return; }
    if(rep === CODE_FINAL){
      victory();
      return;
    }
    printLine("Code incorrect !");
    perdreVie();
  }

  // ---- game loop wiring ----
  function submitCommand(){
    const raw = inputEl.value;
    if(raw.trim() === '' || !handler) { inputEl.value=''; return; }
    printEcho(raw);
    inputEl.value = '';
    handler(raw);
  }

  inputEl.addEventListener('keydown', function(e){
    if(e.key === 'Enter') submitCommand();
  });

  restartBtn.addEventListener('click', function(){
    startGame();
  });

  function startGame(){
    vies = VIES_MAX;
    inventaire = [];
    screenEl.innerHTML = '';
    inputEl.disabled = false;
    inputEl.placeholder = "Tapez une réponse, 'inventaire' ou 'indice'…";
    restartBtn.style.display = 'none';
    updateStatus('SALLE 01');
    printLine(
`${cyan('=== 🛰 Bienvenue dans l\'Escape Game 🚀 ===')}<br>
Vous êtes dans une station spatiale. Il y a un problème avec le module de
recyclage d'air. 😨 Le mode survie est enclenché, vous devez retourner dans
la navette de sauvetage qui possède un système actif et autonome.<br>
Pour vous en sortir vivant, vous devez passer d'une pièce à une autre pour
atteindre la navette. Répondez aux énigmes pour débloquer l'ouverture des sas.<br>
Commandes possibles : 'inventaire' 👜, 'indice' 💡`);
    room1Init();
    inputEl.focus();
  }

  startGame();
})();
</script>
